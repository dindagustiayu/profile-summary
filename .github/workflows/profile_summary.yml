name: GitHub-Profile-Summary-Cards

on:
  create:
  push:
  schedule: # execute every 24 hours
    - cron: "* */24 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v2
      - uses: dindagustiayu/github-profile-summary@release
        env:
          GITHUB_TOKEN: ${{ secrets.SHERLOCK_HOLMES}}
        with:
          USERNAME: ${{ github.dindagustiayu }}
